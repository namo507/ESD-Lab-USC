name: Deploy Pages site

# Triggers
# --------
# - push to main: re-build + deploy on any source change
# - workflow_dispatch: manual redeploy from the Actions tab
# - repository_dispatch (type: redeploy-pages): triggered by the uptime
#   monitor when it detects the live site is unhealthy
on:
  push:
    branches: [main]
    paths:
      - "web/dashboard-source.html"
      - "web/pages-overlay.css"
      - "web/pages-overlay.js"
      - "scripts/build_pages_site.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  repository_dispatch:
    types: [redeploy-pages]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://esd-lab-namo.pages.dev/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build deploy artifact
        run: |
          python scripts/build_pages_site.py
          test -s dist/pages-wrapper/index.html
          ls -lah dist/pages-wrapper/

      - name: Set up Node (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/pages-wrapper --project-name=esd-lab-namo --branch=main --commit-dirty=true

      - name: Smoke test live URL
        run: |
          # Give the Pages edge a moment to propagate, then probe.
          sleep 25
          python scripts/check_site_health.py \
            --url https://esd-lab-namo.pages.dev/ \
            --timeout 30 \
            --min-bytes 8192

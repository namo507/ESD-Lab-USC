name: Deploy Pages site

on:
  push:
    branches: [main]
    paths:
      - "web/index.html"
      - "web/package.json"
      - "web/package-lock.json"
      - "web/public/**"
      - "web/src/**"
      - "web/vite.config.ts"
      - "web/tsconfig.json"
      - "scripts/build_pages_site.py"
      - "scripts/check_site_health.py"
      - "dashboard/public/pages_wrapper/manifest.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  repository_dispatch:
    types: [redeploy-pages]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        working-directory: web
        run: npm ci

      - name: Build React SPA
        working-directory: web
        env:
          VITE_USE_MOCKS: "true"
          VITE_LIVE_ASSISTANT: "true"
        run: |
          npm run build
          test -s build/index.html

      - name: Package deploy artifact
        env:
          PAGES_API_ORIGIN: ${{ vars.PAGES_API_ORIGIN }}
        run: |
          python scripts/build_pages_site.py
          test -s dist/pages-wrapper/index.html
          test -s dist/pages-wrapper/_worker.js
          test -s dist/pages-wrapper/_redirects
          ls -lah dist/pages-wrapper/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/pages-wrapper --project-name=esd-lab-namo --branch=main --commit-dirty=true

      - name: Smoke test live URL
        run: |
          sleep 25
          python scripts/check_site_health.py \
            --url https://esd-lab-namo.pages.dev/ \
            --timeout 30 \
            --min-bytes 8192

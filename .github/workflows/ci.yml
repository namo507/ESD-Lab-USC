name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_imputation.py

      - name: Check formatting (black)
        run: black --check src/ tests/ scripts/ redcap/

      - name: Run flake8
        run: |
          flake8 src/ tests/ scripts/ redcap/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503

  test-dashboard-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build dashboard image
        run: docker compose build dashboard

      - name: Start dashboard runtime
        run: docker compose up -d dashboard

      - name: Smoke test dashboard runtime
        run: python3 scripts/check_dashboard_runtime.py --base-url http://127.0.0.1:8080 --timeout 180

      - name: Dashboard logs
        if: always()
        run: docker compose logs --tail=200 dashboard

      - name: Tear down services
        if: always()
        run: docker compose down --remove-orphans --volumes

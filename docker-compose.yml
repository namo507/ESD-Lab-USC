services:
  dashboard:
    init: true
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json
          import urllib.request
          payload = json.load(urllib.request.urlopen('http://127.0.0.1:8080/api/healthz'))
          assert payload.get('status') == 'ok'
          assert payload.get('dashboard')
          assert payload.get('readings')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  dashboard-share:
    profiles: ["share"]
    image: cloudflare/cloudflared:latest
    depends_on:
      dashboard:
        condition: service_healthy
    command: tunnel --no-autoupdate --url http://dashboard:8080
    restart: unless-stopped

  dashboard-share-named:
    profiles: ["share"]
    image: cloudflare/cloudflared:latest
    depends_on:
      dashboard:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
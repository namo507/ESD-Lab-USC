services:
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json
          import urllib.request
          payload = json.load(urllib.request.urlopen('http://127.0.0.1:8080/api/healthz'))
          assert payload.get('dashboard')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NANO Dashboard · ESD Lab</title>
<link rel="stylesheet" href="styles/colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
html,body{height:100%;}
.pulse-dot{animation: nano-pulse 1.6s ease-in-out infinite;}
@keyframes nano-pulse {
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(.85);}
}
.flow-line { stroke-dashoffset: 0; animation: dashflow 1.2s linear infinite; }
@keyframes dashflow { to { stroke-dashoffset: -16; } }
button:focus-visible{outline:none;box-shadow:0 0 0 2px #fafaf9, 0 0 0 4px #ffcc00;}
input:focus-visible{outline:none;border-color:#73000a;box-shadow:0 0 0 2px rgba(255,204,0,0.4);}
select:focus-visible{outline:none;border-color:#73000a;}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#73000a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#73000a"/>
    <g transform="translate(420 280)">
      <rect x="0" y="0" width="360" height="6" fill="#ffcc00"/>
      <rect x="0" y="20" width="360" height="6" fill="#ffffff"/>
      <rect x="0" y="40" width="220" height="6" fill="#ffffff"/>
    </g>
    <g transform="translate(300 480)" fill="none" stroke="#ffcc00" stroke-width="3">
      <circle cx="0" cy="0" r="40"/>
      <circle cx="200" cy="0" r="40"/>
      <circle cx="400" cy="0" r="40"/>
      <circle cx="600" cy="0" r="40"/>
      <line x1="40" y1="0" x2="160" y2="0"/>
      <line x1="240" y1="0" x2="360" y2="0"/>
      <line x1="440" y1="0" x2="560" y2="0"/>
    </g>
    <text x="600" y="640" text-anchor="middle" fill="#ffffff" font-family="serif" font-size="32" font-weight="600">ESD Lab · NANO Dashboard</text>
  </svg>
</template>
<div id="root" data-screen-label="NANO Dashboard"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>

<script type="text/babel" src="src/screens/redcap.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
